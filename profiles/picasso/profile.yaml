name: picasso
title: 毕加索项目画像
config_source: .env
default_request_type: new-feature
default_branch: ${PICASSO_DEFAULT_BRANCH}
workspace_dir: ${PICASSO_WORKSPACE_DIR}
request_key_rule: kebab-case-english
environment_boundary:
  mode: ${PICASSO_ENV_BOUNDARY_MODE}
  allowed_runtime_profiles: ${PICASSO_ALLOWED_RUNTIME_PROFILES}
  forbidden_runtime_profiles: ${PICASSO_FORBIDDEN_RUNTIME_PROFILES}
preflight:
  enabled: true
  docs_capability: docs
  dev_capability: dev
  db_capability: db
  deploy_capability: deploy
  install_guide: install/开发环境安装指引.md
  block_on_failure: true
  autopilot_after_pass: true
platforms:
  backend: true
  pc: true
  miniapp: true
  mobile_app: true
repos:
  server: ${PICASSO_SERVER_CODE_DIR}
  front: ${PICASSO_FRONT_CODE_DIR}
  miniapp: ${PICASSO_MINIAPP_CODE_DIR}
  mobile_app: ${PICASSO_MOBILE_APP_CODE_DIR}
task_root: ${PICASSO_SERVER_TASK_DIR}
environments:
  local_runtime:
    profiles: ${PICASSO_ALLOWED_RUNTIME_PROFILES}
    db_host: ${PICASSO_LOCAL_DB_HOST}
    db_port: ${PICASSO_LOCAL_DB_PORT}
    db_name: ${PICASSO_LOCAL_DB_NAME}
    require_psql: ${PICASSO_REQUIRE_LOCAL_DB_CLI}
runtime_orchestration:
  auto_start_local_services: ${PICASSO_AUTO_START_LOCAL_SERVICES}
  auto_stop_local_services: ${PICASSO_AUTO_STOP_LOCAL_SERVICES}
  auto_fetch_access_token: ${PICASSO_AUTO_FETCH_ACCESS_TOKEN}
  ready_timeout_sec: ${PICASSO_RUNTIME_READY_TIMEOUT_SEC}
  runtime_dir: ${PICASSO_RUNTIME_DIR}
  backend:
    workdir: ${PICASSO_BACKEND_START_WORKDIR}
    command: ${PICASSO_BACKEND_START_CMD}
    base_url: ${PICASSO_BACKEND_BASE_URL}
    health_url: ${PICASSO_BACKEND_HEALTH_URL}
    expect_text: ${PICASSO_BACKEND_EXPECT_TEXT}
  frontend:
    workdir: ${PICASSO_FRONTEND_START_WORKDIR}
    command: ${PICASSO_FRONTEND_START_CMD}
    ready_url: ${PICASSO_FRONTEND_READY_URL}
    expect_text: ${PICASSO_FRONTEND_EXPECT_TEXT}
  auth:
    api_prefix: ${PICASSO_API_PREFIX}
    login_url: ${PICASSO_LOGIN_URL}
    login_method: ${PICASSO_LOGIN_METHOD}
    username: ${PICASSO_LOGIN_USERNAME}
    tenant_id: ${PICASSO_LOGIN_TENANT_ID}
    tenant_header: ${PICASSO_LOGIN_TENANT_HEADER}
    request_body_template: ${PICASSO_LOGIN_REQUEST_BODY_TEMPLATE}
    token_path: ${PICASSO_LOGIN_TOKEN_PATH}
tools:
  primary_cli: ${CLAUDE_BIN}
  coding_cli: ${CODEX_BIN}
  enhanced_mode: ${CODEX_PLUGIN_CC_ENABLED}
skill_source:
  root: ${PICASSO_SKILL_ROOT_DIR}
  distribution: single-source
